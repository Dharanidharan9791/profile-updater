name: Naukri Profile Updater

on:
  # Run daily at 4:30 AM UTC = 10:00 AM IST
  schedule:
    - cron: '30 4 * * *'
  # Allow manual trigger from GitHub UI
  workflow_dispatch:

jobs:
  update-profile:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Run profile updater
        env:
          NAUKRI_EMAIL: ${{ secrets.NAUKRI_EMAIL }}
          NAUKRI_PASSWORD: ${{ secrets.NAUKRI_PASSWORD }}
          NAUKRI_HEADLINE: ${{ secrets.NAUKRI_HEADLINE }}
          NAUKRI_RUN_ONCE: 'true'
        run: node src/index.js
